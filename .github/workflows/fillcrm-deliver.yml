name: FillCRM - Monthly Delivery

on:
  schedule:
    - cron: "0 9 1 * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: fillcrm-deliver
  cancel-in-progress: false

jobs:
  deliver:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger FillCRM delivery
        env:
          API_URL: ${{ secrets.SKRUBCRM_API_URL }}
          CRON_SECRET: ${{ secrets.SKRUBCRM_CRON_SECRET }}
        run: |
          : "${API_URL:?SKRUBCRM_API_URL secret not set}"
          : "${CRON_SECRET:?SKRUBCRM_CRON_SECRET secret not set}"
          curl -fsS --max-time 300 \
            --retry 3 --retry-delay 5 --retry-connrefused \
            -X POST \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: $CRON_SECRET" \
            -d '{"dry_run": false}' \
            "$API_URL/api/fillcrm/deliver"
