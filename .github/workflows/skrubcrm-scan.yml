name: SkrubCRM - Automated Scans

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: skrubcrm-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger scan API
        env:
          API_URL: ${{ secrets.SKRUBCRM_API_URL }}
          CRON_SECRET: ${{ secrets.SKRUBCRM_CRON_SECRET }}
        run: |
          : "${API_URL:?SKRUBCRM_API_URL secret not set}"
          : "${CRON_SECRET:?SKRUBCRM_CRON_SECRET secret not set}"
          curl -fsS --max-time 120 \
            --retry 3 --retry-delay 5 --retry-connrefused \
            -X POST \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: $CRON_SECRET" \
            -d '{"dry_run": false}' \
            "$API_URL/api/scan/run"
